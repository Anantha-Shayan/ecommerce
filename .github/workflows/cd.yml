name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      owner_lc: ${{ steps.meta.outputs.owner_lc }}
      repo_lc: ${{ steps.meta.outputs.repo_lc }}
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image metadata
        id: meta
        run: |
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo_lc="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          echo "owner_lc=${owner_lc}" >> "${GITHUB_OUTPUT}"
          echo "repo_lc=${repo_lc}" >> "${GITHUB_OUTPUT}"
          echo "backend_image=${repo_lc}-backend" >> "${GITHUB_OUTPUT}"
          echo "frontend_image=${repo_lc}-frontend" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner_lc }}/${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner_lc }}/${{ steps.meta.outputs.backend_image }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          build-args: |
            VITE_API_URL=/api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner_lc }}/${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner_lc }}/${{ steps.meta.outputs.frontend_image }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deployment assets to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          port: ${{ secrets.GCP_VM_PORT || '22' }}
          source: "deploy/docker-compose.prod.yml,deploy/.env.prod.example"
          target: ${{ secrets.GCP_VM_APP_DIR }}
          strip_components: 0

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_NAMESPACE: ${{ needs.build-and-push.outputs.owner_lc }}
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build-and-push.outputs.frontend_image }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          APP_DIR: ${{ secrets.GCP_VM_APP_DIR }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          port: ${{ secrets.GCP_VM_PORT || '22' }}
          envs: GHCR_NAMESPACE,BACKEND_IMAGE,FRONTEND_IMAGE,IMAGE_TAG,APP_DIR,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -eu
            mkdir -p "${APP_DIR}"
            cd "${APP_DIR}"
            test -f .env.prod || {
              echo ".env.prod is missing in ${APP_DIR}" >&2
              exit 1
            }
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            docker compose --env-file .env.prod -f deploy/docker-compose.prod.yml pull
            GHCR_NAMESPACE="${GHCR_NAMESPACE}" \
            BACKEND_IMAGE="${BACKEND_IMAGE}" \
            FRONTEND_IMAGE="${FRONTEND_IMAGE}" \
            IMAGE_TAG="${IMAGE_TAG}" \
            docker compose --env-file .env.prod -f deploy/docker-compose.prod.yml up -d
            docker compose --env-file .env.prod -f deploy/docker-compose.prod.yml ps
            docker image prune -f
