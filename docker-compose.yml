services:
  postgres:
    image: postgres:16-alpine
    container_name: ec_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecsecret}
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecuser} -d ${POSTGRES_DB:-ecommerce}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: ec_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ec_backend
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-ecuser}:${POSTGRES_PASSWORD:-ecsecret}@postgres:5432/${POSTGRES_DB:-ecommerce}
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: ecommerce_logs
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-long-random-string}
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
    command: >
      sh -c "alembic upgrade head &&
             python -m scripts.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: ec_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pg_data:
  mongo_data:
