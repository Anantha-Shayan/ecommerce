<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
  <style>
    .box { fill:#111827; stroke:#4b5563; stroke-width:2; rx:16; }
    .label { fill:#f8fafc; font-family:Inter,system-ui,sans-serif; font-size:16px; font-weight:700; }
    .text { fill:#d1d5db; font-family:Inter,system-ui,sans-serif; font-size:12px; }
    .line { stroke:#6b7280; stroke-width:2; marker-end:url(#arrow); }
    .small { font-size:11px; fill:#9ca3af; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6b7280" />
    </marker>
  </defs>
  <rect class="box" x="40" y="40" width="200" height="90" />
  <text class="label" x="64" y="70">USERS</text>
  <text class="text" x="64" y="92">PK id</text>
  <text class="text" x="64" y="108">email, role links</text>

  <rect class="box" x="320" y="40" width="200" height="90" />
  <text class="label" x="354" y="70">PRODUCTS</text>
  <text class="text" x="354" y="92">PK id</text>
  <text class="text" x="354" y="108">seller_id, category_id</text>

  <rect class="box" x="600" y="40" width="200" height="90" />
  <text class="label" x="644" y="70">ORDERS</text>
  <text class="text" x="644" y="92">PK id</text>
  <text class="text" x="644" y="108">user_id, address_id</text>

  <rect class="box" x="160" y="180" width="200" height="90" />
  <text class="label" x="202" y="210">CART_ITEMS</text>
  <text class="text" x="202" y="232">PK id</text>
  <text class="text" x="202" y="248">cart_id, product_id, qty</text>

  <rect class="box" x="420" y="180" width="200" height="90" />
  <text class="label" x="455" y="210">ORDER_ITEMS</text>
  <text class="text" x="455" y="232">PK id</text>
  <text class="text" x="455" y="248">order_id, product_id, qty</text>

  <rect class="box" x="680" y="180" width="200" height="90" />
  <text class="label" x="710" y="210">PAYMENTS</text>
  <text class="text" x="710" y="232">PK id</text>
  <text class="text" x="710" y="248">order_id, status, amount</text>

  <line class="line" x1="140" y1="90" x2="160" y2="180" />
  <text class="small" x="110" y="140">1-to-many</text>
  <line class="line" x1="420" y1="90" x2="420" y2="180" />
  <text class="small" x="390" y="140">1-to-many</text>
  <line class="line" x1="720" y1="90" x2="720" y2="180" />
  <text class="small" x="690" y="140">1-to-many</text>
  <line class="line" x1="740" y1="90" x2="760" y2="180" />
  <text class="small" x="730" y="140">1-to-1</text>

  <rect class="box" x="40" y="340" width="200" height="90" />
  <text class="label" x="64" y="372">CATEGORIES</text>
  <text class="text" x="64" y="394">PK id</text>
  <text class="text" x="64" y="410">name, slug</text>

  <rect class="box" x="320" y="340" width="200" height="90" />
  <text class="label" x="354" y="372">INVENTORY</text>
  <text class="text" x="354" y="394">PK id</text>
  <text class="text" x="354" y="410">product_id, qty, threshold</text>

  <rect class="box" x="600" y="340" width="200" height="90" />
  <text class="label" x="644" y="372">REVIEWS</text>
  <text class="text" x="644" y="394">PK id</text>
  <text class="text" x="644" y="410">product_id, user_id, rating</text>

  <line class="line" x1="440" y1="130" x2="440" y2="340" />
  <text class="small" x="450" y="235">1-to-many</text>
  <line class="line" x1="680" y1="130" x2="680" y2="340" />
  <text class="small" x="690" y="235">1-to-many</text>
  <line class="line" x1="240" y1="130" x2="240" y2="340" />
  <text class="small" x="250" y="235">1-to-many</text>
</svg>
